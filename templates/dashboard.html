<!DOCTYPE html>
<html>

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Device Dashboard - Pro Edition</title>
        <link rel="manifest" href="/static/manifest.json">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="theme-color" content="#000000">
        <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/style.css">
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/static/sw.js');
                });
            }
        </script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; color: #00ff9c; }

        #stats {
            margin-bottom: 20px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #333;
        }

        #devices {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: left;
        }

        .online { color: #00ff9c; font-weight: bold; }
        .offline { color: #ff4d4d; font-weight: bold; }

        .snapshot-box {
            width: 100%;
            height: 120px;
            background: #000;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .snapshot-frame {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .snapshot-debug {
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            background: #121212;
            border: 1px solid #2d2d2d;
            font-size: 12px;
            color: #bdbdbd;
        }

        .snapshot-debug strong {
            color: #00ff9c;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            border: none;
            background: #00ff9c;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background: #00cc7d; }

        #map {
            height: 450px;
            margin: 20px auto;
            border-radius: 12px;
            width: 95%;
            border: 2px solid #333;
        }

        /* ⚠️ System Alert Table */
        #log-container {
            width: 95%;
            margin: 20px auto;
            background: #111;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th { background: #222; color: #00ff9c; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: left; font-size: 13px; }

        #snapshots {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .snapshot {
            width: 220px;
            margin: 10px;
            border-radius: 8px;
            border: 2px solid #00ff9c;
            transition: transform 0.3s;
        }

        .snapshot:hover { transform: scale(1.05); }

        body { padding-bottom: 20px; }
    </style>
</head>

<body>

    <h1>📊 PRO DEVICE COMMAND CENTER</h1>

    <div id="stats">
        Devices Online: <span id="onlineCount" class="online">0</span> |
        Total Registered: <span id="totalCount">0</span>
    </div>

    <div id="stats" style="display:block; width:95%; margin:10px auto; text-align:left;">
        <b>Runtime Metrics</b><br>
        Uptime: <span id="metric-uptime">--</span> |
        Dashboard Viewers: <span id="metric-viewers">0</span> |
        Telemetry/s: <span id="metric-telemetry-rate">0</span> |
        Alerts/s: <span id="metric-alert-rate">0</span> |
        Telegram sent/s: <span id="metric-telegram-sent-rate">0</span> |
        Telegram failed/s: <span id="metric-telegram-failed-rate">0</span>
    </div>

    <div id="devices"></div>

    <div id="map"></div>

    <div id="log-container">
        <h3>⚠️ System Alerts</h3>
        <table>
            <thead>
                <tr>
                    <th>Device</th>
                    <th>Level</th>
                    <th>Message</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="alert-body">
                </tbody>
        </table>
    </div>

    <h3>📸 Captured Snapshots</h3>
    <div id="snapshots"></div>

    <script>
        const socket = io({
            transports: ['websocket'],
            upgrade: false,
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 2000
        });
        const MAX_TRAIL_POINTS = 120;
        const MAX_TRAIL_DEVICES = 80;
        const MIN_TRAIL_DELTA = 0.0002;
        const MAX_ALERTS = 100;
        const MAX_SNAPSHOTS = 50;
        const latestSnapshotByDevice = {};
        const snapshotStatsByDevice = {};

        function getSnapshotStats(deviceId) {
            if (!snapshotStatsByDevice[deviceId]) {
                snapshotStatsByDevice[deviceId] = {
                    snapshots: 0,
                    lastSnapshotAt: 0,
                };
            }
            return snapshotStatsByDevice[deviceId];
        }

        function formatAge(timestamp) {
            if (!timestamp) return 'never';
            const seconds = Math.max(0, Math.floor((Date.now() - timestamp) / 1000));
            return `${seconds}s ago`;
        }

        function paintSnapshotStats(deviceId) {
            const stats = snapshotStatsByDevice[deviceId];
            if (!stats) return;

            const countEl = document.getElementById(`snapshots-count-${deviceId}`);
            const ageEl = document.getElementById(`snapshot-age-${deviceId}`);

            if (countEl) countEl.textContent = String(stats.snapshots);
            if (ageEl) ageEl.textContent = formatAge(stats.lastSnapshotAt);
        }

        // ------------------------
        // MAP SETUP (Upgraded)
        // ------------------------
        let map = L.map('map').setView([6.5244, 3.3792], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const markerCluster = L.markerClusterGroup({
            maxClusterRadius: 40,
            disableClusteringAtZoom: 15,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false
        });
        map.addLayer(markerCluster);

        let markers = {};
        let trails = {};
        let lastTrailPointByDevice = {};

        function hasMeaningfulMovement(lastPoint, lat, lon) {
            if (!lastPoint) return true;
            return Math.abs(lastPoint[0] - lat) >= MIN_TRAIL_DELTA || Math.abs(lastPoint[1] - lon) >= MIN_TRAIL_DELTA;
        }

        socket.on("connect", () => {
            socket.emit("join_dashboard");
        });

        // ------------------------
        // DASHBOARD UPDATE ENGINE
        // ------------------------
        socket.on("dashboard_update", devices => {
            const container = document.getElementById("devices");
            const htmlParts = [];
            let online = 0;
            const total = Object.keys(devices).length;
            const activeIds = new Set(Object.keys(devices));

            for (const id in devices) {
                const d = devices[id];
                if (d.status === "online") online++;
                const existingSnapshot = latestSnapshotByDevice[id] || "";
                const noFeedStyle = existingSnapshot ? "display:none;" : "position:absolute; font-size:10px; color:#555;";
                const stats = getSnapshotStats(id);

                htmlParts.push(`
                    <div class="card">
                        <div class="snapshot-box">
                            <img id="live-${id}" class="snapshot-frame" src="${existingSnapshot}">
                            <div id="label-${id}" style="${noFeedStyle}">No Snapshot Yet</div>
                        </div>
                        <br>
                        <b>ID:</b> ${id.substring(0, 10)}...<br>
                        <b>Model:</b> ${d.model || "Unknown"}<br>
                        <b>Browser:</b> ${d.browser || "--"}<br>
                        <b>IP:</b> ${d.ip_address || "--"}<br>
                        <b>Consent:</b> ${d.consent_granted ? 'Yes' : 'No'}<br>
                        <b>Network:</b> ${d.network || "--"}<br>
                        <b>Battery:</b> ${d.battery || "--"} (${d.charging ? '⚡' : '🔋'})<br>
                        <b>Status:</b> <span class="${d.status === "online" ? "online" : "offline"}">${d.status}</span>

                        <div class="snapshot-debug">
                            <div><strong>Snapshots:</strong> <span id="snapshots-count-${id}">${stats.snapshots}</span></div>
                            <div><strong>Last snapshot:</strong> <span id="snapshot-age-${id}">${formatAge(stats.lastSnapshotAt)}</span></div>
                        </div>

                        <button onclick="takePhoto('${id}')">📸 Trigger Snapshot</button>
                    </div>
                `);

                if (Number.isFinite(Number(d.lat)) && Number.isFinite(Number(d.lon))) {
                    const lat = Number(d.lat);
                    const lon = Number(d.lon);

                    if (!markers[id]) {
                        markers[id] = L.marker([lat, lon]).bindPopup(id);
                        markerCluster.addLayer(markers[id]);

                        if (Object.keys(trails).length < MAX_TRAIL_DEVICES) {
                            trails[id] = L.polyline([[lat, lon]], { color: "#00ff9c", weight: 3 }).addTo(map);
                            lastTrailPointByDevice[id] = [lat, lon];
                        }
                    } else {
                        markers[id].setLatLng([lat, lon]);

                        if (trails[id] && hasMeaningfulMovement(lastTrailPointByDevice[id], lat, lon)) {
                            trails[id].addLatLng([lat, lon]);
                            lastTrailPointByDevice[id] = [lat, lon];

                            const points = trails[id].getLatLngs();
                            if (points.length > MAX_TRAIL_POINTS) {
                                trails[id].setLatLngs(points.slice(points.length - MAX_TRAIL_POINTS));
                            }
                        }
                    }
                }
            }

            container.innerHTML = htmlParts.join("");

            activeIds.forEach((id) => {
                paintSnapshotStats(id);
            });

            Object.keys(markers).forEach((id) => {
                if (!activeIds.has(id)) {
                    markerCluster.removeLayer(markers[id]);
                    if (trails[id]) map.removeLayer(trails[id]);
                    delete markers[id];
                    delete trails[id];
                    delete lastTrailPointByDevice[id];
                    delete latestSnapshotByDevice[id];
                    delete snapshotStatsByDevice[id];
                }
            });

            document.getElementById("onlineCount").innerText = online;
            document.getElementById("totalCount").innerText = total;
        });

        // ------------------------
        // ⚠️ SYSTEM ALERT RECEIVER
        // ------------------------
        socket.on("system_alert", data => {
            const tableBody = document.getElementById("alert-body");
            const row = `
                <tr>
                    <td style="color:#00ff9c">${data.device_id.substring(0, 8)}</td>
                    <td><b>${data.level || 'info'}</b></td>
                    <td>${data.message || ''}</td>
                    <td>${new Date(data.timestamp ? data.timestamp * 1000 : Date.now()).toLocaleTimeString()}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('afterbegin', row);

            while (tableBody.children.length > MAX_ALERTS) {
                tableBody.removeChild(tableBody.lastElementChild);
            }
        });

        // ------------------------
        // COMMANDS & SNAPSHOTS
        // ------------------------
        function takePhoto(deviceId) {
            socket.emit("request_snapshot", deviceId);
        }

        socket.on("view_snapshot", (data) => {
            latestSnapshotByDevice[data.device_id] = data.image;
            const stats = getSnapshotStats(data.device_id);
            stats.snapshots += 1;
            stats.lastSnapshotAt = Date.now();
            const box = document.getElementById("snapshots");
            const el = document.createElement("img");
            el.src = data.image;
            el.className = "snapshot";
            box.prepend(el);

            const imgElement = document.getElementById(`live-${data.device_id}`);
            const label = document.getElementById(`label-${data.device_id}`);
            if (imgElement) {
                imgElement.src = data.image;
                if (label) label.style.display = "none";
            }
            paintSnapshotStats(data.device_id);

            while (box.children.length > MAX_SNAPSHOTS) {
                box.removeChild(box.lastElementChild);
            }
        });

        function formatUptime(seconds) {
            const total = Number(seconds || 0);
            const h = Math.floor(total / 3600);
            const m = Math.floor((total % 3600) / 60);
            const s = total % 60;
            return `${h}h ${m}m ${s}s`;
        }

        async function refreshMetrics() {
            try {
                const response = await fetch('/metrics', { cache: 'no-store' });
                if (!response.ok) return;
                const data = await response.json();

                document.getElementById('metric-uptime').innerText = formatUptime(data.uptime_seconds);
                document.getElementById('metric-viewers').innerText = data.sockets.dashboard_viewers;
                document.getElementById('metric-telemetry-rate').innerText = data.rates_per_second.telemetry_events;
                document.getElementById('metric-alert-rate').innerText = data.rates_per_second.system_alerts;
                document.getElementById('metric-telegram-sent-rate').innerText = data.rates_per_second.telegram_sent;
                document.getElementById('metric-telegram-failed-rate').innerText = data.rates_per_second.telegram_failed;
            } catch (error) {
                console.log('Metrics refresh failed', error);
            }
        }

        refreshMetrics();
        setInterval(refreshMetrics, 5000);

    </script>
</body>
</html>
