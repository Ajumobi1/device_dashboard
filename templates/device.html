<!DOCTYPE html>
<html>

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Telemetry Command Center</title>
        <link rel="manifest" href="/static/manifest.json">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="theme-color" content="#000000">
        <link rel="apple-touch-icon" href="/static/icon-192.png">

        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/static/sw.js');
                });
            }
        </script>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        body {
            background: #0b0b0b;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1 { color: #00ff9c; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        /* 📊 Dashboard Stats Bar */
        #stats-bar {
            text-align: center;
            margin-bottom: 20px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        #devices {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            margin: 10px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); border-color: #00ff9c; }

        /* 📸 Snapshot Viewport Styling */
        .live-viewport {
            width: 100%;
            height: 160px;
            background: #000;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .live-frame { width: 100%; height: 100%; object-fit: cover; }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #00ff9c;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00cc7d; box-shadow: 0 0 10px #00ff9c; }

        /* 🗺️ Map Styling */
        #map {
            height: 450px;
            margin: 20px auto;
            border-radius: 15px;
            width: 95%;
            border: 2px solid #333;
        }

        /* ⚠️ Alert Log Table */
        #sms-log-container {
            width: 95%;
            margin: 20px auto;
            background: #111;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #222; color: #00ff9c; padding: 12px; text-align: left; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }

        /* 📸 Snapshot Gallery */
        #snapshots {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .snapshot-img {
            width: 240px;
            border-radius: 10px;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .snapshot-img:hover { border-color: #00ff9c; transform: scale(1.05); }

        #audio-bridge { display: none; }
    </style>
</head>

<body>

    <h1>📊 PRO COMMAND DASHBOARD</h1>

    <div id="stats-bar">
        Active Connections: <span id="active-count" style="color:#00ff9c">0</span> | 
        System Time: <span id="sys-time">--:--:--</span>
    </div>

    <div id="devices"></div>

    <div id="map"></div>

    <div id="sms-log-container">
        <h3>⚠️ System Alert Feed</h3>
        <table>
            <thead>
                <tr>
                    <th>Target ID</th>
                    <th>Level</th>
                    <th>Message</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="sms-table-body">
                </tbody>
        </table>
    </div>

    <h3>📸 Recent Snapshots</h3>
    <div id="snapshots"></div>

    <audio id="audio-bridge" autoplay></audio>

    <script>
        const socket = io({
            transports: ['websocket'],
            upgrade: false,
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 2000
        });
        const MAX_TRAIL_POINTS = 120;
        const MAX_TRAIL_DEVICES = 80;
        const MIN_TRAIL_DELTA = 0.0002;
        const MAX_ALERTS = 100;
        const MAX_SNAPSHOTS = 50;
        const latestSnapshotByDevice = {};
        const snapshotStatsByDevice = {};

        function getSnapshotStats(deviceId) {
            if (!snapshotStatsByDevice[deviceId]) {
                snapshotStatsByDevice[deviceId] = {
                    snapshots: 0,
                    lastSnapshotAt: 0,
                };
            }
            return snapshotStatsByDevice[deviceId];
        }

        function formatAge(timestamp) {
            if (!timestamp) return 'never';
            const seconds = Math.max(0, Math.floor((Date.now() - timestamp) / 1000));
            return `${seconds}s ago`;
        }

        function paintSnapshotStats(deviceId) {
            const stats = snapshotStatsByDevice[deviceId];
            if (!stats) return;

            const countEl = document.getElementById(`snapshots-count-${deviceId}`);
            const ageEl = document.getElementById(`snapshot-age-${deviceId}`);

            if (countEl) countEl.textContent = String(stats.snapshots);
            if (ageEl) ageEl.textContent = formatAge(stats.lastSnapshotAt);
        }

        // --------------------------------------------------------
        // 🗺️ MAP ENGINE (High-Accuracy Trails)
        // --------------------------------------------------------
        let map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        const markerCluster = L.markerClusterGroup({
            maxClusterRadius: 40,
            disableClusteringAtZoom: 15,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false
        });
        map.addLayer(markerCluster);

        let markers = {};
        let movementPaths = {};
        let lastTrailPointByDevice = {};

        function hasMeaningfulMovement(lastPoint, lat, lon) {
            if (!lastPoint) return true;
            return Math.abs(lastPoint[0] - lat) >= MIN_TRAIL_DELTA || Math.abs(lastPoint[1] - lon) >= MIN_TRAIL_DELTA;
        }

        socket.on("connect", () => {
            socket.emit("join_dashboard");
        });

        // --------------------------------------------------------
        // 🔄 MAIN DASHBOARD SYNC
        // --------------------------------------------------------
        socket.on("dashboard_update", (devices) => {
            const container = document.getElementById("devices");
            const htmlParts = [];
            let online = 0;
            const activeIds = new Set(Object.keys(devices));

            for (const id in devices) {
                const d = devices[id];
                if (d.status === "online") online++;
                const existingSnapshot = latestSnapshotByDevice[id] || "";
                const waitingStyle = existingSnapshot ? "display:none;" : "color:#444; font-size:12px;";
                const stats = getSnapshotStats(id);

                htmlParts.push(`
                    <div class="card">
                        <div class="live-viewport">
                            <img id="stream-${id}" class="live-frame" src="${existingSnapshot}">
                            <span id="label-${id}" style="${waitingStyle}">Waiting for Snapshot...</span>
                        </div>
                        <b>ID:</b> ${id.substring(0, 12)}<br>
                        <b>Model:</b> ${d.model || "Analyzing..."}<br>
                        <b>Browser:</b> ${d.browser || "--"}<br>
                        <b>IP:</b> ${d.ip_address || "--"}<br>
                        <b>Consent:</b> ${d.consent_granted ? 'YES' : 'NO'}<br>
                        <b>Network:</b> ${d.network || "Standard"}<br>
                        <b>Battery:</b> ${d.battery || "0%"} (${d.charging ? '⚡ Charging' : '🔋 Discharging'})<br>
                        <b>Status:</b> <span style="color:${d.status === 'online' ? '#00ff9c' : '#ff4d4d'}">${d.status.toUpperCase()}</span>

                        <div style="margin:10px 0; padding:8px; border:1px solid #1f1f1f; background:#101010; border-radius:6px; font-size:12px; color:#bdbdbd;">
                            <div><span style="color:#00ff9c; font-weight:bold;">Snapshots:</span> <span id="snapshots-count-${id}">${stats.snapshots}</span></div>
                            <div><span style="color:#00ff9c; font-weight:bold;">Last snapshot:</span> <span id="snapshot-age-${id}">${formatAge(stats.lastSnapshotAt)}</span></div>
                        </div>

                        <button onclick="requestSnapshot('${id}')">📸 TRIGGER SNAPSHOT</button>
                        <button onclick="requestPushTest('${id}')">🔔 TEST PUSH</button>
                    </div>
                `);

                if (Number.isFinite(Number(d.lat)) && Number.isFinite(Number(d.lon))) {
                    const lat = Number(d.lat);
                    const lon = Number(d.lon);

                    if (!markers[id]) {
                        markers[id] = L.marker([lat, lon]).bindPopup(`Device: ${id}`);
                        markerCluster.addLayer(markers[id]);

                        if (Object.keys(movementPaths).length < MAX_TRAIL_DEVICES) {
                            movementPaths[id] = L.polyline([[lat, lon]], { color: '#00ff9c', weight: 4 }).addTo(map);
                            lastTrailPointByDevice[id] = [lat, lon];
                        }
                    } else {
                        markers[id].setLatLng([lat, lon]);

                        if (movementPaths[id] && hasMeaningfulMovement(lastTrailPointByDevice[id], lat, lon)) {
                            movementPaths[id].addLatLng([lat, lon]);
                            lastTrailPointByDevice[id] = [lat, lon];

                            const points = movementPaths[id].getLatLngs();
                            if (points.length > MAX_TRAIL_POINTS) {
                                movementPaths[id].setLatLngs(points.slice(points.length - MAX_TRAIL_POINTS));
                            }
                        }
                    }
                }
            }

            container.innerHTML = htmlParts.join("");

            activeIds.forEach((id) => {
                paintSnapshotStats(id);
            });

            Object.keys(markers).forEach((id) => {
                if (!activeIds.has(id)) {
                    markerCluster.removeLayer(markers[id]);
                    if (movementPaths[id]) map.removeLayer(movementPaths[id]);
                    delete markers[id];
                    delete movementPaths[id];
                    delete lastTrailPointByDevice[id];
                    delete latestSnapshotByDevice[id];
                    delete snapshotStatsByDevice[id];
                }
            });

            document.getElementById("active-count").innerText = online;
        });

        // --------------------------------------------------------
        // ⚠️ SYSTEM ALERT LOGGING
        // --------------------------------------------------------
        socket.on("system_alert", (data) => {
            const tableBody = document.getElementById("sms-table-body");
            const newRow = `
                <tr>
                    <td style="color:#00ff9c">${data.device_id.substring(0, 8)}</td>
                    <td><b>${data.level || 'info'}</b></td>
                    <td>${data.message || ''}</td>
                    <td>${new Date(data.timestamp ? data.timestamp * 1000 : Date.now()).toLocaleTimeString()}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('afterbegin', newRow);

            while (tableBody.children.length > MAX_ALERTS) {
                tableBody.removeChild(tableBody.lastElementChild);
            }
        });

        // --------------------------------------------------------
        // 📸 SNAPSHOT HANDLERS
        // --------------------------------------------------------
        function requestSnapshot(deviceId) {
            socket.emit("request_snapshot", deviceId);
        }

        async function requestPushTest(deviceId) {
            try {
                const response = await fetch(`/push-test/${encodeURIComponent(deviceId)}`);
                const payload = await response.json().catch(() => ({}));

                const tableBody = document.getElementById("sms-table-body");
                const level = response.ok ? 'info' : 'error';
                const message = response.ok
                    ? `Push test dispatched for ${deviceId.substring(0, 8)}`
                    : `Push test failed for ${deviceId.substring(0, 8)}: ${payload.error || 'unknown error'}`;

                const newRow = `
                    <tr>
                        <td style="color:#00ff9c">${deviceId.substring(0, 8)}</td>
                        <td><b>${level}</b></td>
                        <td>${message}</td>
                        <td>${new Date().toLocaleTimeString()}</td>
                    </tr>
                `;

                tableBody.insertAdjacentHTML('afterbegin', newRow);
                while (tableBody.children.length > MAX_ALERTS) {
                    tableBody.removeChild(tableBody.lastElementChild);
                }
            } catch (_) {
                const tableBody = document.getElementById("sms-table-body");
                const newRow = `
                    <tr>
                        <td style="color:#00ff9c">${deviceId.substring(0, 8)}</td>
                        <td><b>error</b></td>
                        <td>Push test request failed: network/server unavailable</td>
                        <td>${new Date().toLocaleTimeString()}</td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('afterbegin', newRow);
            }
        }

        socket.on("view_snapshot", (data) => {
            latestSnapshotByDevice[data.device_id] = data.image;
            const stats = getSnapshotStats(data.device_id);
            stats.snapshots += 1;
            stats.lastSnapshotAt = Date.now();

            const frameImg = document.getElementById(`stream-${data.device_id}`);
            const label = document.getElementById(`label-${data.device_id}`);
            if (frameImg) {
                frameImg.src = data.image;
                if (label) label.style.display = "none";
            }
            paintSnapshotStats(data.device_id);

            const box = document.getElementById("snapshots");
            const img = document.createElement("img");
            img.src = data.image;
            img.className = "snapshot-img";
            box.prepend(img);

            while (box.children.length > MAX_SNAPSHOTS) {
                box.removeChild(box.lastElementChild);
            }
        });

        // Simple clock for the dashboard
        setInterval(() => {
            document.getElementById("sys-time").innerText = new Date().toLocaleTimeString();
        }, 1000);

    </script>
</body>

</html>
